<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Westris</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f0f0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Westris">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            background: radial-gradient(circle, #2c2c3a 0%, #000000 100%);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-wrapper {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            transform-origin: top center;
        }

        #game-container {
            position: relative;
            border: 2px solid rgba(0, 240, 240, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            border-radius: 6px 0 0 6px;
        }

        #game-canvas {
            display: block;
            background-color: #000;
            background-image:
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
        }

        /* ── Side panel ───────────────────────────────────── */
        #ui {
            width: 160px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(0, 240, 240, 0.3);
            border-left: 1px solid rgba(0, 240, 240, 0.15);
            border-radius: 0 6px 6px 0;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            user-select: none;
        }

        .ui-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(0, 240, 240, 0.1);
        }

        .ui-section:last-child {
            border-bottom: none;
        }

        .ui-hidden {
            display: none;
        }

        .ui-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00f0f0;
            text-shadow: 0 0 6px rgba(0, 240, 240, 0.6);
            margin-bottom: 10px;
        }

        #next-canvas {
            border: 1px solid rgba(0, 240, 240, 0.2);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.5);
        }

        #score-box {
            background: rgba(0, 240, 240, 0.05);
            border: 1px solid rgba(0, 240, 240, 0.18);
            border-radius: 8px;
            padding: 8px 18px;
            min-width: 80px;
            text-align: center;
        }

        #score {
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #00f0f0;
            text-shadow: 0 0 10px rgba(0, 240, 240, 0.5);
            user-select: none;
        }

        #speedometer-container {
            width: 124px;
        }

        #speedometer-container svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }

        /* ── Overlay ──────────────────────────────────────── */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 0 16px;
            background: rgba(0, 0, 0, 0.88);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 20px rgba(0, 240, 240, 0.6), 0 0 40px rgba(0, 240, 240, 0.2); }
            50%       { text-shadow: 0 0 30px rgba(0, 240, 240, 0.9), 0 0 60px rgba(0, 240, 240, 0.4), 0 0 80px rgba(0, 240, 240, 0.15); }
        }

        h1 {
            margin: 0;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: #00f0f0;
            animation: titlePulse 3s ease-in-out infinite;
            user-select: none;
        }

        .overlay-subtitle {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(0, 240, 240, 0.45);
            margin-top: -16px;
        }

        .overlay-version {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.45rem;
            letter-spacing: 3px;
            color: rgba(0, 240, 240, 0.2);
            margin-top: -10px;
            user-select: none;
        }

        .difficulty-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .difficulty-group label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(0, 240, 240, 0.6);
        }

        .difficulty-pills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
        }

        .difficulty-pills input[type="radio"] {
            display: none;
        }

        .difficulty-pills label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: rgba(0, 240, 240, 0.55);
            border: 1px solid rgba(0, 240, 240, 0.25);
            border-radius: 20px;
            padding: 6px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
        }

        .difficulty-pills input[type="radio"]:checked + label {
            color: #000;
            background: #00f0f0;
            border-color: #00f0f0;
            box-shadow: 0 0 14px rgba(0, 240, 240, 0.5);
        }

        .difficulty-pills label:hover {
            color: #00f0f0;
            border-color: rgba(0, 240, 240, 0.6);
        }

        button {
            padding: 13px 36px;
            font-size: 0.85rem;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: transparent;
            color: #00f0f0;
            border: 2px solid #00f0f0;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease, transform 0.15s ease;
            box-shadow: 0 0 12px rgba(0, 240, 240, 0.2), inset 0 0 0px rgba(0, 240, 240, 0);
        }

        button:hover {
            background: #00f0f0;
            color: #000;
            box-shadow: 0 0 28px rgba(0, 240, 240, 0.6), 0 0 60px rgba(0, 240, 240, 0.2), inset 0 0 20px rgba(255,255,255,0.15);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.98);
        }

        /* ── Overlay gap ──────────────────────────────────── */
        #overlay { gap: 14px; }

        /* ── Game over banner ─────────────────────────────── */
        #gameover-section {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .gameover-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 6px;
            color: #ff4455;
            text-shadow: 0 0 12px rgba(255, 68, 85, 0.7);
            margin: 0;
        }

        .gameover-score-label {
            font-size: 0.55rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(0, 240, 240, 0.4);
            margin: 4px 0 0;
        }

        .gameover-final-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 12px rgba(0, 240, 240, 0.4);
            margin: 0;
        }

        /* ── High score table ─────────────────────────────── */
        .highscore-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .highscore-table {
            width: 88%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }

        .highscore-table td {
            padding: 4px 3px;
            border-bottom: 1px solid rgba(0, 240, 240, 0.07);
        }

        .highscore-table tr:last-child td { border-bottom: none; }

        .hs-rank {
            width: 18px;
            text-align: center;
            color: rgba(0, 240, 240, 0.45);
            font-weight: 700;
        }

        .hs-name {
            text-align: left;
            padding-left: 8px !important;
            color: rgba(255, 255, 255, 0.85);
            max-width: 130px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .hs-score {
            text-align: right;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            color: #00f0f0;
        }

        .hs-empty {
            text-align: center;
            color: rgba(0, 240, 240, 0.25);
            font-style: italic;
            padding: 10px 0;
            font-size: 0.7rem;
            font-family: inherit;
        }

        .hs-new td { background: rgba(0, 240, 240, 0.06); }
        .hs-new .hs-rank,
        .hs-new .hs-name { color: #00f0f0; }

        /* ── Name entry modal ─────────────────────────────── */
        #name-modal {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(6px);
        }

        #name-modal.hidden { display: none; }

        .name-modal-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 28px 22px;
            width: 230px;
            border: 1px solid rgba(0, 240, 240, 0.3);
            border-radius: 14px;
            background: rgba(0, 8, 8, 0.97);
            box-shadow: 0 0 50px rgba(0, 240, 240, 0.12);
        }

        .name-modal-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #00f0f0;
            text-shadow: 0 0 10px rgba(0, 240, 240, 0.6);
            margin: 0;
        }

        .name-modal-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 240, 240, 0.3);
            margin: 0;
            line-height: 1;
        }

        .name-modal-hint {
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(0, 240, 240, 0.45);
            margin: 0;
        }

        #name-input {
            width: 100%;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-align: center;
            text-transform: uppercase;
            background: rgba(0, 240, 240, 0.05);
            border: 1px solid rgba(0, 240, 240, 0.3);
            border-radius: 8px;
            color: #fff;
            padding: 9px 12px;
            outline: none;
        }

        #name-input::placeholder {
            color: rgba(0, 240, 240, 0.2);
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: none;
        }

        #name-input:focus {
            border-color: rgba(0, 240, 240, 0.65);
            box-shadow: 0 0 14px rgba(0, 240, 240, 0.18);
        }

        .name-modal-box button {
            width: 100%;
            padding: 10px 0;
            font-size: 0.75rem;
            letter-spacing: 3px;
        }

        .mute-btn {
            background: none;
            border: 1px solid rgba(0, 240, 240, 0.25);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1rem;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: rgba(0, 240, 240, 0.6);
            letter-spacing: 0;
        }

        .mute-btn:hover {
            border-color: rgba(0, 240, 240, 0.6);
            color: #00f0f0;
            transform: scale(1.05);
            background: transparent;
            box-shadow: none;
        }

        /* ── Touch controls ───────────────────────────────── */
        #touch-controls {
            display: none;
        }

        body.touch-device {
            align-items: flex-start;
            padding-top: 12px;
        }

        body.touch-device #game-wrapper {
            flex-direction: column;
        }

        body.touch-device #ui {
            width: 300px;
            height: 80px;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            border-radius: 6px 6px 0 0;
            border: 2px solid rgba(0, 240, 240, 0.3);
            border-bottom: 1px solid rgba(0, 240, 240, 0.15);
            box-shadow: none;
            padding: 0 4px;
            gap: 0;
        }

        body.touch-device #game-container {
            border-radius: 0 0 6px 6px;
        }

        body.touch-device .ui-section {
            flex-direction: column;
            width: auto;
            flex: 1;
            padding: 4px 6px;
            border-bottom: none;
            border-right: 1px solid rgba(0, 240, 240, 0.1);
            gap: 2px;
            align-items: center;
            justify-content: center;
        }

        body.touch-device .ui-section:last-child {
            border-right: none;
        }

        body.touch-device .ui-label {
            font-size: 0.55rem;
            letter-spacing: 2px;
            margin-bottom: 0;
        }

        body.touch-device #speedometer-container {
            width: 58px;
        }

        body.touch-device #next-canvas {
            width: 36px !important;
            height: 36px !important;
        }

        body.touch-device #score {
            font-size: 1.1rem;
        }

        body.touch-device #touch-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 20px 24px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(0, 240, 240, 0.12);
            z-index: 50;
        }

        .tc-row {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        .tc-btn {
            width: 54px;
            height: 54px;
            font-size: 1.3rem;
            background: rgba(0, 240, 240, 0.07);
            border: 1px solid rgba(0, 240, 240, 0.3);
            border-radius: 14px;
            color: #00f0f0;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        .tc-btn:active {
            background: rgba(0, 240, 240, 0.22);
            box-shadow: 0 0 14px rgba(0, 240, 240, 0.3);
        }

        .tc-placeholder {
            width: 54px;
            height: 54px;
        }
    </style>
</head>

<body>

    <div id="game-wrapper">
    <div id="game-container">
        <canvas id="game-canvas" width="300" height="500"></canvas>

        <div id="overlay">
            <h1>Westris</h1>
            <p class="overlay-subtitle">Block Puzzle</p>
            <p class="overlay-version">v2.0</p>

            <div id="gameover-section">
                <p class="gameover-title">Game Over</p>
                <p class="gameover-score-label">Score</p>
                <p class="gameover-final-score" id="gameover-score-value">0</p>
            </div>

            <div class="difficulty-group">
                <label>Difficulty</label>
                <div class="difficulty-pills">
                    <input type="radio" name="difficulty" id="diff-easy" value="1000">
                    <label for="diff-easy">Easy</label>
                    <input type="radio" name="difficulty" id="diff-normal" value="700" checked>
                    <label for="diff-normal">Normal</label>
                    <input type="radio" name="difficulty" id="diff-hard" value="400">
                    <label for="diff-hard">Hard</label>
                    <input type="radio" name="difficulty" id="diff-insane" value="200">
                    <label for="diff-insane">Insane</label>
                </div>
            </div>

            <div class="highscore-section">
                <span class="ui-label">High Scores</span>
                <table class="highscore-table">
                    <tbody id="highscore-body"></tbody>
                </table>
            </div>

            <button id="start-button">Start Game</button>
        </div>

        <div id="name-modal" class="hidden">
            <div class="name-modal-box">
                <p class="name-modal-title">New High Score!</p>
                <p class="name-modal-score" id="modal-score">0</p>
                <p class="name-modal-hint">Enter your name</p>
                <input type="text" id="name-input" maxlength="12" placeholder="Your name"
                    autocomplete="off" spellcheck="false">
                <button id="name-submit">Save Score</button>
            </div>
        </div>

    </div>
    <div id="ui">
            <div id="ui-next" class="ui-section ui-hidden">
                <span class="ui-label">Next</span>
                <canvas id="next-canvas" width="80" height="80"></canvas>
            </div>
            <div id="ui-score" class="ui-section ui-hidden">
                <span class="ui-label">Score</span>
                <div id="score-box"><span id="score">0</span></div>
            </div>
            <div class="ui-section">
                <button id="mute-btn" class="mute-btn" title="Toggle sound">🔊</button>
            </div>
            <div class="ui-section">
                <span class="ui-label">Speed</span>
                <div id="speedometer-container">
                    <!-- 270° gauge: center(50,46) r=36, from 135° to 45° clockwise, arc length=169.6 -->
                    <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
                        <!-- background track -->
                        <path d="M 24.5 71.5 A 36 36 0 1 1 75.5 71.5"
                            fill="none" stroke="rgba(0,240,240,0.12)" stroke-width="7" stroke-linecap="round"/>
                        <!-- progress arc -->
                        <path id="speed-track"
                            d="M 24.5 71.5 A 36 36 0 1 1 75.5 71.5"
                            fill="none" stroke="#00f0f0" stroke-width="7" stroke-linecap="round"
                            stroke-dasharray="169.6" stroke-dashoffset="169.6"
                            style="transition: stroke-dashoffset 0.35s ease; filter: drop-shadow(0 0 4px #00f0f0);"/>
                        <!-- speed value -->
                        <text id="speed-value" x="50" y="50" text-anchor="middle" dominant-baseline="middle"
                            fill="#ffffff" font-size="13" font-weight="bold"
                            font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">1.0x</text>
                        <!-- min / max labels -->
                        <text x="19" y="79" text-anchor="middle"
                            fill="rgba(0,240,240,0.45)" font-size="7"
                            font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">1x</text>
                        <text x="81" y="79" text-anchor="middle"
                            fill="rgba(0,240,240,0.45)" font-size="7"
                            font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">6x</text>
                    </svg>
                </div>
            </div>
        </div>
    </div>
    </div>

    <div id="touch-controls">
        <div class="tc-row">
            <button class="tc-btn" id="tc-left">◄</button>
            <button class="tc-btn" id="tc-drop">▼</button>
            <button class="tc-btn" id="tc-rotate">↻</button>
            <button class="tc-btn" id="tc-right">►</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startButton = document.getElementById('start-button');
        const overlay = document.getElementById('overlay');

        context.scale(25, 25);

        const PIECES = {
            'I': [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]],
            'L': [[0, 2, 0], [0, 2, 0], [0, 2, 2]],
            'J': [[0, 3, 0], [0, 3, 0], [3, 3, 0]],
            'O': [[4, 4], [4, 4]],
            'Z': [[5, 5, 0], [0, 5, 5], [0, 0, 0]],
            'S': [[0, 6, 6], [6, 6, 0], [0, 0, 0]],
            'T': [[0, 7, 0], [7, 7, 7], [0, 0, 0]]
        };

        const colors = [null, '#00f0f0', '#f0a000', '#0000f0', '#f0f000', '#f00000', '#00f000', '#a000f0'];

        function createMatrix(w, h) {
            return Array.from({ length: h }, () => new Array(w).fill(0));
        }

        // ── Audio System ───────────────────────────────────────────────
        const GameAudio = (() => {
            let ctx = null;
            let muted = localStorage.getItem('westris_mute') === '1';

            function getCtx() {
                if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
                return ctx;
            }

            function play(type, freq, duration, freqEnd, gain = 0.3) {
                if (muted) return;
                try {
                    const ac = getCtx();
                    const osc = ac.createOscillator();
                    const gainNode = ac.createGain();
                    osc.connect(gainNode);
                    gainNode.connect(ac.destination);
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, ac.currentTime);
                    if (freqEnd) osc.frequency.linearRampToValueAtTime(freqEnd, ac.currentTime + duration);
                    gainNode.gain.setValueAtTime(gain, ac.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
                    osc.start(ac.currentTime);
                    osc.stop(ac.currentTime + duration);
                } catch (e) {}
            }

            function arpeggio(notes, duration) {
                notes.forEach(([type, freq, t]) => {
                    setTimeout(() => play(type, freq, duration), t);
                });
            }

            return {
                isMuted: () => muted,
                toggleMute() {
                    muted = !muted;
                    localStorage.setItem('westris_mute', muted ? '1' : '0');
                    return muted;
                },
                move()     { play('triangle', 220, 0.05); },
                rotate()   { play('sine', 300, 0.08, 600); },
                lock()     { play('sine', 80, 0.15, null, 0.4); },
                clear(n)   {
                    if (n >= 3) arpeggio([['square',440,0],['square',550,80],['square',660,160],['square',880,240]], 0.12);
                    else if (n === 2) arpeggio([['sawtooth',440,0],['sawtooth',880,100]], 0.15);
                    else play('sawtooth', 440, 0.2, 880);
                },
                gameOver() { arpeggio([['sawtooth',440,0],['sawtooth',370,80],['sawtooth',311,160],['sawtooth',262,240],['sawtooth',220,320]], 0.12); },
                start()    { arpeggio([['sine',523,0],['sine',659,80],['sine',784,160]], 0.15); },
                highScore(){ arpeggio([['sine',523,0],['sine',659,80],['sine',784,160],['sine',1047,240]], 0.18); },
            };
        })();

        const muteBtn = document.getElementById('mute-btn');
        muteBtn.textContent = GameAudio.isMuted() ? '🔇' : '🔊';
        muteBtn.addEventListener('click', () => {
            muteBtn.textContent = GameAudio.toggleMute() ? '🔇' : '🔊';
        });

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, { x: 0, y: 0 });
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'white';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function playerCollide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0) {
                        if (arena[y + o.y] === undefined ||
                            arena[y + o.y][x + o.x] === undefined ||
                            arena[y + o.y][x + o.x] !== 0) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            let clearedRows = 0;
            outer: for (let y = arena.length - 1; y >= 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0];
                arena.unshift(new Array(arena[0].length).fill(0));
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
                clearedRows++;
            }
            if (clearedRows > 0) {
                dropInterval = Math.max(initialDropInterval * 0.3, dropInterval - clearedRows * 30);
                GameAudio.clear(clearedRows);
            }
            updateScore();
        }

        function playerDrop() {
            player.pos.y++;
            if (playerCollide(arena, player)) {
                player.pos.y--;
                GameAudio.lock();
                merge(arena, player);
                arenaSweep();
                playerReset();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (playerCollide(arena, player)) {
                player.pos.x -= dir;
            } else {
                GameAudio.move();
            }
        }

        function playerRotate(dir) {
            const oldMatrix = player.matrix;
            const oldPos = player.pos.x;
            player.matrix = rotate(player.matrix, dir);
            let offset = 1;
            while (playerCollide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    player.matrix = oldMatrix;
                    player.pos.x = oldPos;
                    return;
                }
            }
            GameAudio.rotate();
        }

        function rotate(matrix, dir) {
            const rows = matrix.length;
            const cols = matrix[0].length;
            const newMatrix = Array.from({ length: cols }, () => new Array(rows).fill(0));
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (dir > 0) {
                        newMatrix[c][rows - 1 - r] = matrix[r][c];
                    } else {
                        newMatrix[cols - 1 - c][r] = matrix[r][c];
                    }
                }
            }
            return newMatrix;
        }

        const nextCanvas = document.getElementById('next-canvas');
        const nextContext = nextCanvas.getContext('2d');
        let nextPiece = null;

        function drawNextPiece() {
            const cellSize = 20;
            nextContext.fillStyle = '#000';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (!nextPiece) return;
            const offsetX = Math.floor((nextCanvas.width - nextPiece[0].length * cellSize) / 2);
            const offsetY = Math.floor((nextCanvas.height - nextPiece.length * cellSize) / 2);
            nextPiece.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        nextContext.fillStyle = colors[value];
                        nextContext.fillRect(x * cellSize + offsetX, y * cellSize + offsetY, cellSize, cellSize);
                        nextContext.lineWidth = 1;
                        nextContext.strokeStyle = 'white';
                        nextContext.strokeRect(x * cellSize + offsetX, y * cellSize + offsetY, cellSize, cellSize);
                    }
                });
            });
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (nextPiece === null) {
                nextPiece = PIECES[pieces[pieces.length * Math.random() | 0]];
            }
            player.matrix = nextPiece;
            nextPiece = PIECES[pieces[pieces.length * Math.random() | 0]];
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            drawNextPiece();

            if (playerCollide(arena, player)) {
                const finalScore = player.score;
                const playedInterval = initialDropInterval;
                arena.forEach(row => row.fill(0));
                player.score = 0;
                dropInterval = initialDropInterval;
                nextPiece = null;
                drawNextPiece();
                updateScore();
                gameRunning = false;
                cancelAnimationFrame(animationId);
                GameAudio.gameOver();
                showGameOver(finalScore, playedInterval);
            }
        }

        // Absolute gauge scale: 1000ms (Easy start) = 0%, 60ms (Insane max) = 100%
        const GAUGE_MAX_MS = 1000;
        const GAUGE_MIN_MS = 60;
        const GAUGE_ARC = 169.6;

        function gaugeProgress(interval) {
            return Math.min(Math.max((GAUGE_MAX_MS - interval) / (GAUGE_MAX_MS - GAUGE_MIN_MS), 0), 1);
        }

        function setGauge(interval) {
            const speedValueElement = document.getElementById('speed-value');
            const speedTrack = document.getElementById('speed-track');
            if (speedValueElement)
                speedValueElement.textContent = (GAUGE_MAX_MS / interval).toFixed(1) + 'x';
            if (speedTrack)
                speedTrack.style.strokeDashoffset = GAUGE_ARC * (1 - gaugeProgress(interval));
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            setGauge(dropInterval);
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let initialDropInterval = 1000;
        let lastTime = 0;
        let animationId;
        let gameRunning = false;

        const arena = createMatrix(12, 20);

        const player = {
            pos: { x: 0, y: 0 },
            matrix: null,
            score: 0
        };

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            if (gameRunning) {
                animationId = requestAnimationFrame(update);
            }
        }

        document.addEventListener('keydown', event => {
            if (!gameRunning) return;
            if (event.target.tagName === 'INPUT') return;
            if (event.keyCode === 37 || event.keyCode === 81 || event.keyCode === 65) {
                playerMove(-1);
            } else if (event.keyCode === 39 || event.keyCode === 69 || event.keyCode === 68) {
                playerMove(1);
            } else if (event.keyCode === 40 || event.keyCode === 83) {
                playerDrop();
            } else if (event.keyCode === 38 || event.keyCode === 87) {
                playerRotate(1);
            }
        });

        // ── High score storage ─────────────────────────────────────────
        // ── Supabase config ────────────────────────────────────────────
        const SUPABASE_URL = 'https://tyotapfflueaqqixzeow.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_b0Mo-bHPgddyX8IsR9yAIQ_vjlC83Z7';

        const HS_KEY = 'westris_scores';
        const HS_MAX = 5;
        const INTERVAL_TO_KEY = { 1000: 'easy', 700: 'normal', 400: 'hard', 200: 'insane' };

        function loadScores() {
            try {
                const data = JSON.parse(localStorage.getItem(HS_KEY));
                return data && typeof data === 'object' ? data : {};
            } catch { return {}; }
        }

        function saveScores(scores) {
            localStorage.setItem(HS_KEY, JSON.stringify(scores));
        }

        function diffKey(interval) {
            return INTERVAL_TO_KEY[interval] || 'normal';
        }

        async function fetchScores(interval) {
            try {
                const res = await fetch(
                    `${SUPABASE_URL}/rest/v1/scores?difficulty=eq.${diffKey(interval)}&order=score.desc&limit=${HS_MAX}`,
                    { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
                );
                if (!res.ok) throw new Error();
                return await res.json();
            } catch {
                return (loadScores()[diffKey(interval)]) || [];
            }
        }

        async function postScore(name, score, interval) {
            insertScore(name, score, interval); // save locally as cache
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/scores`, {
                    method: 'POST',
                    headers: {
                        apikey: SUPABASE_ANON_KEY,
                        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        Prefer: 'return=minimal'
                    },
                    body: JSON.stringify({
                        name: name.trim().slice(0, 12) || 'Anonymous',
                        score,
                        difficulty: diffKey(interval)
                    })
                });
            } catch { /* offline — score saved locally only */ }
        }

        function qualifies(score, interval) {
            if (score <= 0) return false;
            const list = (loadScores()[diffKey(interval)]) || [];
            return list.length < HS_MAX || score > list[list.length - 1].score;
        }

        function insertScore(name, score, interval) {
            const scores = loadScores();
            const key = diffKey(interval);
            const list = scores[key] || [];
            list.push({ name: name.trim().slice(0, 12) || 'Anonymous', score });
            list.sort((a, b) => b.score - a.score);
            scores[key] = list.slice(0, HS_MAX);
            saveScores(scores);
            return scores[key].findIndex(e => e.name === (name.trim().slice(0, 12) || 'Anonymous') && e.score === score);
        }

        function safeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function renderHighScores(list, highlightName = null, highlightScore = null) {
            const tbody = document.getElementById('highscore-body');
            if (!list) {
                tbody.innerHTML = '<tr><td colspan="3" class="hs-empty">Loading…</td></tr>';
                return;
            }
            if (list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="hs-empty">No scores yet — be the first!</td></tr>';
                return;
            }
            tbody.innerHTML = list.map((e, i) => {
                const isNew = e.name === highlightName && e.score === highlightScore;
                return `<tr class="${isNew ? 'hs-new' : ''}">
                    <td class="hs-rank">${i + 1}</td>
                    <td class="hs-name">${safeHtml(e.name)}</td>
                    <td class="hs-score">${e.score.toLocaleString()}</td>
                </tr>`;
            }).join('');
        }

        // ── Game over flow ─────────────────────────────────────────────
        async function showGameOver(score, interval) {
            document.getElementById('gameover-score-value').textContent = score.toLocaleString();
            document.getElementById('gameover-section').style.display = 'flex';
            startButton.textContent = 'Play Again';

            const radio = document.querySelector(`input[name="difficulty"][value="${interval}"]`);
            if (radio) radio.checked = true;
            setGauge(interval);

            renderHighScores(null);
            overlay.style.display = 'flex';
            const globalList = await fetchScores(interval);

            const qualifiesGlobal = score > 0 &&
                (globalList.length < HS_MAX || score > globalList[globalList.length - 1].score);

            if (qualifiesGlobal) {
                GameAudio.highScore();
                document.getElementById('modal-score').textContent = score.toLocaleString();
                const modal = document.getElementById('name-modal');
                const input = document.getElementById('name-input');
                renderHighScores(globalList);
                modal.classList.remove('hidden');
                input.value = '';
                setTimeout(() => input.focus(), 50);

                async function submitName() {
                    const name = input.value.trim() || 'Anonymous';
                    modal.classList.add('hidden');
                    renderHighScores(null);
                    await postScore(name, score, interval);
                    const updated = await fetchScores(interval);
                    renderHighScores(updated, name, score);
                }

                document.getElementById('name-submit').onclick = submitName;
                input.onkeydown = e => { if (e.key === 'Enter') submitName(); };
            } else {
                renderHighScores(globalList);
            }
        }

        // ── Difficulty / start wiring ──────────────────────────────────
        function getSelectedDifficulty() {
            const checked = document.querySelector('input[name="difficulty"]:checked');
            return checked ? parseInt(checked.value) : 700;
        }

        startButton.addEventListener('click', () => {
            initialDropInterval = getSelectedDifficulty();
            dropInterval = initialDropInterval;
            document.getElementById('gameover-section').style.display = 'none';
            startButton.textContent = 'Start Game';
            overlay.style.display = 'none';
            document.getElementById('ui-next').classList.remove('ui-hidden');
            document.getElementById('ui-score').classList.remove('ui-hidden');
            gameRunning = true;
            playerReset();
            updateScore();
            GameAudio.start();
            update();
            setTimeout(updateScore, 10);
        });

        document.querySelectorAll('input[name="difficulty"]').forEach(radio => {
            radio.addEventListener('change', async () => {
                const val = parseInt(radio.value);
                setGauge(val);
                renderHighScores(null);
                renderHighScores(await fetchScores(val));
            });
        });

        // Initialise gauge and high score table on load
        setGauge(getSelectedDifficulty());
        renderHighScores(null);
        (async () => renderHighScores(await fetchScores(getSelectedDifficulty())))();

        // ── Responsive scaling ─────────────────────────────────────────
        const gameWrapper = document.getElementById('game-wrapper');
        const BASE_W = 300 + 160; // canvas + side panel
        const BASE_H = 500;
        const isTouchDevice = (navigator.maxTouchPoints > 0) &&
            window.matchMedia('(pointer: coarse)').matches;
        if (isTouchDevice) document.body.classList.add('touch-device');

        function scaleGame() {
            const padding = 32;
            const controlsH = isTouchDevice ? 90 : 0;
            const effectiveW = isTouchDevice ? 300 : BASE_W;
            const effectiveH = isTouchDevice ? 580 : BASE_H; // 500 canvas + 80 top bar
            const scale = Math.min(
                (window.innerWidth  - padding) / effectiveW,
                (window.innerHeight - padding - controlsH) / effectiveH
            );
            gameWrapper.style.transform = `scale(${scale})`;
            // Collapse the unused layout space left by transform: scale()
            gameWrapper.style.marginBottom = ((scale - 1) * effectiveH) + 'px';
        }

        window.addEventListener('resize', scaleGame);
        scaleGame();

        // ── Touch controls ─────────────────────────────────────────────
        function bindTouchBtn(id, action, repeat = false) {
            const btn = document.getElementById(id);
            if (!btn) return;
            let timer = null;
            btn.addEventListener('touchstart', e => {
                e.preventDefault();
                if (!gameRunning) return;
                action();
                if (repeat) timer = setInterval(() => { if (gameRunning) action(); }, 100);
            }, { passive: false });
            const stop = () => { clearInterval(timer); timer = null; };
            btn.addEventListener('touchend',   stop);
            btn.addEventListener('touchcancel', stop);
        }

        bindTouchBtn('tc-left',   () => playerMove(-1), true);
        bindTouchBtn('tc-right',  () => playerMove(1),  true);
        bindTouchBtn('tc-drop',   () => playerDrop(),   true);
        bindTouchBtn('tc-rotate', () => playerRotate(1), false);

        // ── Service worker registration ────────────────────────────────
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
    </script>
