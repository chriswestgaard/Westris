<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Clone</title>
    <style>
          body {
            background: radial-gradient(circle, #2c2c3a 0%, #000000 100%);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }
        #game-container {
            position: relative;
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 10px rgba(0, 0, 0, 0.5);
            border-radius: 5px;
        }
        canvas {
            display: block;
            background-color: #000;
            /* Scanline effect */
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                              linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 100%;
            padding-left: 30px;
            min-width: 150px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border-radius: 0 10px 10px 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            user-select: none; /* Prevent text selection and cursor appearance */
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(3px);
        }
        button {
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: transparent;
            color: #00f0f0;
            border: 2px solid #00f0f0;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 240, 240, 0.3);
        }
        button:hover {
            background: #00f0f0;
            color: #000;
            box-shadow: 0 0 25px rgba(0, 240, 240, 0.6);
            transform: scale(1.05);
        }
        h1 { 
            margin: 0 0 20px 0; 
            font-size: 3rem;
            letter-spacing: 5px;
            color: #00f0f0;
            text-shadow: 0 0 15px rgba(0, 240, 240, 0.7);
            user-select: none; /* Ensure no cursor/selection here */
        }
        .score-label { 
            font-size: 1.8rem; 
            font-weight: bold;
            color: #f0f0f0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        #score {
            color: #00f0f0;
            display: block;
            font-size: 2.5rem;
            user-select: none; /* Ensure no cursor/selection here */
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="tetris" width="300" height="500"></canvas>
        
        <div id="overlay">
            <h1>TETRIS</h1>
            <button id="start-button">START GAME</button>
        </div>

        <div id="ui">
            <div class="score-label">Score: <span id="score">0</span></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startButton = document.getElementById('start-button');
        const overlay = document.getElementById('overlay');

        context.scale(25, 25);

        // Piece logic
        function createPiece(type) {
            if (type === 'I') {
                return [
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                ];
            } else if (type === 'L') {
                return [
                    [0, 2, 0],
                    [0, 2, 0],
                    [0, 2, 2],
                ];
            } else if (type === 'J') {
                return [
                    [0, 3, 0],
                    [0, 3, 0],
                    [3, 3, 0],
                ];
            } else if (
                type === 'O') {
                return [
                    [4, 4],
                    [4, 4],
                ];
            } else if (type === 'Z') {
                return [
                    [5, 5, 0],
                    [0, 5, 5],
                    [0, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 6, 6],
                    [6, 6, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'T') {
                return [
                    [0, 7, 0],
                    [7, 7, 7],
                    [0, 0, 0],
                ];
            }
        }

        const colors = [
            null,
            '#00f0f0', // I
            '#f0a000', // L
            '#0000f0', // J
            '#f0f000', // O
            '#f00000', // Z
            '#00f000', // S
            '#a000f0', // T
        ];

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);

            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        // Add a small border to each block
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'white';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function collide(arena, player) {

                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] && arena[y + o.y][x + o.x] !== 0) ||
                       (arena[y + o.y] && (arena[y + o.y][x + o.x] !== undefined))) {

                for (let x = 0; x < m[y].length; ++x) {

            }
            // Let's use the standard collision check
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0) {
                        if (arena[y + o.y] === undefined || 
                            arena[y + o.y][x + o.x] === undefined || 
                            arena[y + o.y][x + o.x] !== 0) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // Simplified Collision logic for clarity
        function checkCollision(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0) {
                        if (arena[y + o.y] === undefined || 
                            arena[y +

                            arena[y + o.y][x + o.x] !== 0) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // Let's rewrite the collision properly
        function playerCollide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0) {
                        if (arena[y + o.y] === undefined || 
                            arena[y + o.y][x + o.x] === undefined || 
                            arena[y + o.y][x + o.x] !== 0) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

                function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y >= 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0];
                arena.unshift(new Array(arena[0].length).fill(0));
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
            updateScore();
        }

                function playerDrop() {
            player.pos.y++;
            if (playerCollide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                arenaSweep();
                playerReset();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (playerCollide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (playerCollide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (playerCollide(arena, player)) {
                // Game Over
                arena.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
                overlay.style.display = 'flex';
                cancelAnimationFrame(animationId);
            }
        }

        function updateScore() {
            scoreElement.innerText = player.score;
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let animationId;

        const arena = createMatrix(12, 20);

                const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0
        };

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            animationId = requestAnimationFrame(update);
        }

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) { // Left
                event.preventDefault();
                playerMove(-1);
            } else if (event.keyCode === 39) { // Right
                event.preventDefault();
                playerMove(1);
            } else if (event.keyCode === 40) { // Down
                event.preventDefault();
                playerDrop();
            } else if (event.keyCode === 81) { // Q
                playerRotate(-1);
            } else if (event.keyCode === 87) { // W
                playerRotate(1);
            } else if (event.keyCode === 38) { // Up (Rotate)
                playerRotate(1);
            }
        });

        startButton.addEventListener('click', () => {
            overlay.style.display = 'none';
            player.score = 0;
            updateScore();
            playerReset();
            update();
        });

    </script>

</html>
