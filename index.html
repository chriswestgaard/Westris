<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Westris</title>
    <style>
        * { box-sizing: border-box; }

        body {
            background: radial-gradient(circle, #2c2c3a 0%, #000000 100%);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            border: 2px solid rgba(0, 240, 240, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            border-radius: 6px;
        }

        #game-canvas {
            display: block;
            background-color: #000;
            background-image:
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
        }

        /* ── Side panel ───────────────────────────────────── */
        #ui {
            position: absolute;
            top: 0;
            left: 100%;
            width: 160px;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-left: 1px solid rgba(0, 240, 240, 0.15);
            border-radius: 0 6px 6px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            user-select: none;
        }

        .ui-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(0, 240, 240, 0.1);
        }

        .ui-section:last-child {
            border-bottom: none;
        }

        .ui-hidden {
            visibility: hidden;
        }

        .ui-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00f0f0;
            text-shadow: 0 0 6px rgba(0, 240, 240, 0.6);
            margin-bottom: 10px;
        }

        #next-canvas {
            border: 1px solid rgba(0, 240, 240, 0.2);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.5);
        }

        #score {
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 240, 240, 0.4);
            user-select: none;
        }

        #speedometer-container {
            width: 124px;
        }

        #speedometer-container svg {
            width: 100%;
            height: auto;
            overflow: visible;
        }

        /* ── Overlay ──────────────────────────────────────── */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        h1 {
            margin: 0;
            font-size: 2.8rem;
            letter-spacing: 6px;
            color: #00f0f0;
            text-shadow: 0 0 20px rgba(0, 240, 240, 0.6);
            user-select: none;
        }

        .difficulty-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .difficulty-group label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #00f0f0;
            text-shadow: 0 0 6px rgba(0, 240, 240, 0.6);
        }

        #difficulty-select {
            font-size: 1rem;
            font-family: inherit;
            font-weight: 600;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.7);
            color: #00f0f0;
            border: 1px solid rgba(0, 240, 240, 0.5);
            padding: 7px 20px;
            border-radius: 20px;
            outline: none;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 240, 240, 0.2);
            text-align: center;
        }

        button {
            padding: 12px 32px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: transparent;
            color: #00f0f0;
            border: 2px solid #00f0f0;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.25s ease, color 0.25s ease, box-shadow 0.25s ease, transform 0.15s ease;
            box-shadow: 0 0 12px rgba(0, 240, 240, 0.25);
        }

        button:hover {
            background: #00f0f0;
            color: #000;
            box-shadow: 0 0 28px rgba(0, 240, 240, 0.55);
            transform: scale(1.04);
        }
    </style>
</head>

<body>

    <div id="game-container">
        <canvas id="game-canvas" width="300" height="500"></canvas>

        <div id="overlay">
            <h1>Westris</h1>
            <div class="difficulty-group">
                <label for="difficulty-select">Difficulty</label>
                <select id="difficulty-select">
                    <option value="1000">Easy</option>
                    <option value="700">Normal</option>
                    <option value="400">Hard</option>
                    <option value="200">Insane</option>
                </select>
            </div>
            <button id="start-button">Start Game</button>
        </div>

        <div id="ui">
            <div id="ui-next" class="ui-section ui-hidden">
                <span class="ui-label">Next</span>
                <canvas id="next-canvas" width="80" height="80"></canvas>
            </div>
            <div id="ui-score" class="ui-section ui-hidden">
                <span class="ui-label">Score</span>
                <span id="score">0</span>
            </div>
            <div class="ui-section">
                <span class="ui-label">Speed</span>
                <div id="speedometer-container">
                    <!-- 270° gauge: center(50,46) r=36, from 135° to 45° clockwise, arc length=169.6 -->
                    <svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
                        <!-- background track -->
                        <path d="M 24.5 71.5 A 36 36 0 1 1 75.5 71.5"
                            fill="none" stroke="rgba(0,240,240,0.12)" stroke-width="7" stroke-linecap="round"/>
                        <!-- progress arc -->
                        <path id="speed-track"
                            d="M 24.5 71.5 A 36 36 0 1 1 75.5 71.5"
                            fill="none" stroke="#00f0f0" stroke-width="7" stroke-linecap="round"
                            stroke-dasharray="169.6" stroke-dashoffset="169.6"
                            style="transition: stroke-dashoffset 0.35s ease; filter: drop-shadow(0 0 4px #00f0f0);"/>
                        <!-- speed value -->
                        <text id="speed-value" x="50" y="50" text-anchor="middle" dominant-baseline="middle"
                            fill="#ffffff" font-size="13" font-weight="bold"
                            font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">1.0x</text>
                        <!-- min / max labels -->
                        <text x="19" y="79" text-anchor="middle"
                            fill="rgba(0,240,240,0.45)" font-size="7"
                            font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">1x</text>
                        <text x="81" y="79" text-anchor="middle"
                            fill="rgba(0,240,240,0.45)" font-size="7"
                            font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif">6x</text>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startButton = document.getElementById('start-button');
        const overlay = document.getElementById('overlay');

        context.scale(25, 25);

        const PIECES = {
            'I': [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]],
            'L': [[0, 2, 0], [0, 2, 0], [0, 2, 2]],
            'J': [[0, 3, 0], [0, 3, 0], [3, 3, 0]],
            'O': [[4, 4], [4, 4]],
            'Z': [[5, 5, 0], [0, 5, 5], [0, 0, 0]],
            'S': [[0, 6, 6], [6, 6, 0], [0, 0, 0]],
            'T': [[0, 7, 0], [7, 7, 7], [0, 0, 0]]
        };

        const colors = [null, '#00f0f0', '#f0a000', '#0000f0', '#f0f000', '#f00000', '#00f000', '#a000f0'];

        function createMatrix(w, h) {
            return Array.from({ length: h }, () => new Array(w).fill(0));
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, { x: 0, y: 0 });
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'white';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function playerCollide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0) {
                        if (arena[y + o.y] === undefined ||
                            arena[y + o.y][x + o.x] === undefined ||
                            arena[y + o.y][x + o.x] !== 0) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            let clearedRows = 0;
            outer: for (let y = arena.length - 1; y >= 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0];
                arena.unshift(new Array(arena[0].length).fill(0));
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
                clearedRows++;
            }
            if (clearedRows > 0) {
                dropInterval = Math.max(initialDropInterval * 0.1, dropInterval - clearedRows * 30);
            }
            updateScore();
        }

        function playerDrop() {
            player.pos.y++;
            if (playerCollide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                arenaSweep();
                playerReset();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (playerCollide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerRotate(dir) {
            const oldMatrix = player.matrix;
            const oldPos = player.pos.x;
            player.matrix = rotate(player.matrix, dir);
            let offset = 1;
            while (playerCollide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    player.matrix = oldMatrix;
                    player.pos.x = oldPos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            const rows = matrix.length;
            const cols = matrix[0].length;
            const newMatrix = Array.from({ length: cols }, () => new Array(rows).fill(0));
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (dir > 0) {
                        newMatrix[c][rows - 1 - r] = matrix[r][c];
                    } else {
                        newMatrix[cols - 1 - c][r] = matrix[r][c];
                    }
                }
            }
            return newMatrix;
        }

        const nextCanvas = document.getElementById('next-canvas');
        const nextContext = nextCanvas.getContext('2d');
        let nextPiece = null;

        function drawNextPiece() {
            const cellSize = 20;
            nextContext.fillStyle = '#000';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (!nextPiece) return;
            const offsetX = Math.floor((nextCanvas.width - nextPiece[0].length * cellSize) / 2);
            const offsetY = Math.floor((nextCanvas.height - nextPiece.length * cellSize) / 2);
            nextPiece.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        nextContext.fillStyle = colors[value];
                        nextContext.fillRect(x * cellSize + offsetX, y * cellSize + offsetY, cellSize, cellSize);
                        nextContext.lineWidth = 1;
                        nextContext.strokeStyle = 'white';
                        nextContext.strokeRect(x * cellSize + offsetX, y * cellSize + offsetY, cellSize, cellSize);
                    }
                });
            });
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (nextPiece === null) {
                nextPiece = PIECES[pieces[pieces.length * Math.random() | 0]];
            }
            player.matrix = nextPiece;
            nextPiece = PIECES[pieces[pieces.length * Math.random() | 0]];
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            drawNextPiece();

            if (playerCollide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                dropInterval = initialDropInterval;
                nextPiece = null;
                drawNextPiece();
                updateScore();
                overlay.style.display = 'flex';
                cancelAnimationFrame(animationId);
            }
        }

        // Absolute gauge scale: 1000ms (Easy start) = 0%, 20ms (Insane max) = 100%
        const GAUGE_MAX_MS = 1000;
        const GAUGE_MIN_MS = 20;
        const GAUGE_ARC = 169.6;

        function gaugeProgress(interval) {
            return Math.min(Math.max((GAUGE_MAX_MS - interval) / (GAUGE_MAX_MS - GAUGE_MIN_MS), 0), 1);
        }

        function setGauge(interval) {
            const speedValueElement = document.getElementById('speed-value');
            const speedTrack = document.getElementById('speed-track');
            if (speedValueElement)
                speedValueElement.textContent = (GAUGE_MAX_MS / interval).toFixed(1) + 'x';
            if (speedTrack)
                speedTrack.style.strokeDashoffset = GAUGE_ARC * (1 - gaugeProgress(interval));
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            setGauge(dropInterval);
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let initialDropInterval = 1000; 
        let lastTime = 0;
        let animationId;

        const arena = createMatrix(12, 20);

        const player = {
            pos: { x: 0, y: 0 },
            matrix: null,
            score: 0
        };

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            animationId = requestAnimationFrame(update);
        }

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37 || event.keyCode === 81) {
                playerMove(-1);
            } else if (event.keyCode === 39 || event.keyCode === 69) {
                playerMove(1);
            } else if (event.keyCode === 40 || event.keyCode === 83) {
                playerDrop();
            } else if (event.keyCode === 38 || event.keyCode === 87) {
                playerRotate(-1);
            }
        });

        startButton.addEventListener('click', () => {
            const difficultySelect = document.getElementById('difficulty-select');
            initialDropInterval = parseInt(difficultySelect.value);
            dropInterval = initialDropInterval;
            overlay.style.display = 'none';
            document.getElementById('ui-next').classList.remove('ui-hidden');
            document.getElementById('ui-score').classList.remove('ui-hidden');
            playerReset();
            updateScore();
            update();
            // Ensure speedometer updates after overlay is hidden
            setTimeout(updateScore, 10);
        });

        const difficultySelect = document.getElementById('difficulty-select');
        if (difficultySelect) {
            difficultySelect.addEventListener('change', () => {
                const newInterval = parseInt(difficultySelect.value);
                initialDropInterval = newInterval;

                setGauge(newInterval);
            });
        }
    </script>
</body>

</html>
