<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Westris Clone</title>
    <style>
        body {
            background: radial-gradient(circle, #2c2c3a 0%, #000000 100%);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            user-select: none;
            -webkit-user-select: none;
            outline: none;
        }

        #game-container {
            position: relative;
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 10px rgba(0, 0, 0, 0.5);
            border-radius: 5px;
        }

        canvas {
            display: block;
            background-color: #000;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 100%;
            padding-left: 30px;
            min-width: 150px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border-radius: 0 10px 10px 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            user-select: none;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(3px);
        }

        button {
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: transparent;
            color: #00f0f0;
            border: 2px solid #00f0f0;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 240, 240, 0.3);
        }

        button:hover {
            background: #00f0f0;
            color: #000;
            box-shadow: 0 0 25px rgba(0, 240, 240, 0.6);
            transform: scale(1.05);
        }

        h1 {
            margin: 0 0 20px 0;
            font-size: 3rem;
            letter-spacing: 5px;
            color: #00f0f0;
            text-shadow: 0 0 15px rgba(0, 240, 240, 0.7);
            user-select: none;
        }

        .score-label {
            font-size: 1.8rem;
            font-weight: bold;
            color: #f0f0f0;
            text-shadow: 0 0 10px rgba(200, 255, 255, 0.3);
        }

        #score {
            color: #00f0f0;
            display: block;
            font-size: 2.5rem;
            user-select: none;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <canvas id="Westris" width="300" height="500"></canvas>

        <div id="overlay">
            <br>
            <h1 style="margin: 0 0 20px 0;">Westris</h1>
            <div style="margin-bottom: 20px;">
                <div style="margin-bottom: 10px; text-align: center;">
                    <label for="difficulty-select"
                        style="font-size: 1.2rem; color: #00f0f0; text-shadow: 0 0 5px #00f0f0; display: block; margin-bottom: 5px;">DIFFICULTY</label>
                    <select id="difficulty-select"
                        style="font-size: 1.2rem; background: rgba(0, 0, 0, 0.7); color: #00f0f0; border: 1px solid #00f0f0; padding: 5px 15px; border-radius: 20px; outline: none; cursor: pointer; box-shadow: 0 0 10px rgba(0, 240, 240, 0.3); font-family: inherit;">
                        <option value="1000">EASY</option>
                        <option value="700">NORMAL</option>
                        <option value="400">HARD</option>
                        <option value="200">INSANE</option>
                    </select>
                </div>
            </div>
            <button id="start-button">START GAME</button>
        </div>

        <div id="ui">
            <div class="score-label">Score: <span id="score">0</span></div>
            <div id="speedometer-container" style="width: 150px; height: 150px; position: relative;">
                <svg viewBox="0 0 100 100" style="transform: rotate(-90deg); width: 100%; height: 100%;">
                    <!-- Background Track -->
                    <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(0, 240, 240, 0.1)" stroke-width="8" />
                    <!-- Progress Track -->
                    <circle id="speed-track" cx="50" cy="50" r="40" fill="none" stroke="#00f0f0" stroke-width="8"
                        stroke-dasharray="251.2" stroke-dashoffset="251.2"
                        style="transition: stroke-dashoffset 0.3s ease; filter: drop-shadow(0 0 5px #00f0f0);" />
                </svg>
                <div
                    style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
                    <div style="font-size: 0.7rem; color: #00f0f0; text-shadow: 0 0 5px #00f0f0;">SPEED</div>
                    <div id="speed-value" style="font-size: 1.2rem; font-weight: bold; color: #fff;">1.0</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('Westris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const speedElement = document.getElementById('speed');
        const startButton = document.getElementById('start-button');
        const overlay = document.getElementById('overlay');

        context.scale(25, 25);

        const PIECES = {
            'I': [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]],
            'L': [[0, 2, 0], [0, 2, 0], [0, 2, 2]],
            'J': [[0, 3, 0], [0, 3, 0], [3, 3, 0]],
            'O': [[4, 4], [4, 4]],
            'Z': [[5, 5, 0], [0, 5, 5], [0, 0, 0]],
            'S': [[0, 6, 6], [6, 6, 0], [0, 0, 0]],
            'T': [[0, 7, 0], [7, 7, 7], [0, 0, 0]]
        };

        const colors = [null, '#00f0f0', '#f0a000', '#0000f0', '#f0f000', '#f00000', '#00f000', '#a000f0'];

        function createMatrix(w, h) {
            return Array.from({ length: h }, () => new Array(w).fill(0));
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, { x: 0, y: 0 });
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'white';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function playerCollide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0) {
                        if (arena[y + o.y] === undefined ||
                            arena[y + o.y][x + o.x] === undefined ||
                            arena[y + o.y][x + o.x] !== 0) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y >= 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0];
                arena.unshift(new Array(arena[0].length).fill(0));
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
            }
            updateScore();
        }

        function playerDrop() {
            player.pos.y++;
            if (playerCollide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                arenaSweep();
                playerReset();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (playerCollide(arena, player)) {
                player.pos.x -= dir;
            }
        }

        function playerRotate(dir) {
            const oldMatrix = player.matrix;
            const oldPos = player.pos.x;
            player.matrix = rotate(player.matrix, dir);
            let offset = 1;
            while (playerCollide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    player.matrix = oldMatrix;
                    player.pos.x = oldPos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            const rows = matrix.length;
            const cols = matrix[0].length;
            const newMatrix = Array.from({ length: cols }, () => new Array(rows).fill(0));
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (dir > 0) {
                        newMatrix[c][rows - 1 - r] = matrix[r][c];
                    } else {
                        newMatrix[cols - 1 - c][r] = matrix[r][c];
                    }
                }
            }
            return newMatrix;
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = PIECES[pieces[pieces.length * Math.random() | 0]];
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

            if (playerCollide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                dropInterval = 1000;
                updateScore();
                overlay.style.display = 'flex';
                cancelAnimationFrame(animationId);
            }
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            const speedValueElement = document.getElementById('speed-value');
            const speedTrack = document.getElementById('speed-track');

            if (overlay.style.display !== 'flex') {
                const speedMultiplier = (initialDropInterval / dropInterval).toFixed(1);
                if (speedValueElement) speedValueElement.innerText = speedMultiplier;

                if (speedTrack) {
                    // Calculate dashoffset: circumference is ~251.2 for r=40
                    // We want 1.0x to be a small part and high speed to be full
                    // Let's map 1.0x - 10.0x to 0% - 100%
                    const maxSpeed = 10.0;
                    const progress = Math.min(speedMultiplier / maxSpeed, 1);
                    const circumference = 251.2;
                    const offset = circumference * (1 - progress);
                    speedTrack.style.strokeDashoffset = offset;
                }
            } else {
                if (speedValueElement) speedValue.innerText = '0.0';
                if (speedTrack) speedTrack.style.strokeDashoffset = '251.2';
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let animationId;

        const arena = createMatrix(12, 20);

        const player = {
            pos: { x: 0, y: 0 },
            matrix: null,
            score: 0
        };

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            animationId = requestAnimationFrame(update);
        }

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37 || event.keyCode === 81) {
                playerMove(-1);
            } else if (event.keyCode === 39 || event.keyCode === 69) {
                playerMove(1);
            } else if (event.keyCode === 40 || event.keyCode === 83) {
                playerDrop();
            } else if (event.keyCode === 38 || event.keyCode === 87) {
                playerRotate(-1);
            }
        });

        startButton.addEventListener('click', () => {
            const difficultySelect = document.getElementById('difficulty-select');
            initialDropInterval = parseInt(difficultySelect.value);
            dropInterval = initialDropInterval;
            overlay.style.display = 'none';
            playerReset();
            updateScore();
            update();
            // Ensure speedometer updates after overlay is hidden
            setTimeout(updateScore, 10);
        });

        const difficultySelect = document.getElementById('difficulty-select');
        if (difficultySelect) {
            difficultySelect.addEventListener('change', () => {
                const newInterval = parseInt(difficultySelect.value);
                initialDropInterval = newInterval;

                const speedValueElement = document.getElementById('speed-value');
                const speedTrack = document.getElementById('speed-track');
                if (speedValueElement) {
                    const previewMultiplier = (1000 / newInterval).toFixed(1);
                    speedValueElement.innerText = previewMultiplier;
                }
                if (speedTrack) {
                    const maxSpeed = 10.0;
                    const progress = Math.min((1000 / newInterval) / maxSpeed, 1);
                    const circumference = 251.2;
                    const offset = circumference * (1 - progress);
                    speedTrack.style.strokeDashoffset = offset;
                }
            });
        }
    </script>
</body>

</html>
